name: Build and Deploy to GKE

on:
  push:
    branches:
      - main

env:
  GOOGLE_PROJECT_ID: "knu-2026-taxpackcmi"
  GAR_LOCATION: "asia-northeast1"
  GKE_CLUSTER: "pepsi-clustor"
  GKE_LOCATION: "asia-northeast1"
  REPOSITORY: "randomchat-app-repository"
  IMAGE: "randomchat-app"
  DEPLOYMENT_NAME: "randomchat-app-deployment"
  CONTAINER_NAME: "randomchat-app"
  NAMESPACE: "default"

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - id: auth
        name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ env.GOOGLE_PROJECT_ID }}
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Docker Auth
        uses: docker/login-action@v3
        with:
          username: _json_key
          password: ${{ secrets.GCP_CREDENTIALS }}
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER }}
          location: ${{ env.GKE_LOCATION }}
          project_id: ${{ env.GOOGLE_PROJECT_ID }}

      # --- .env 파일 생성 (빌드 시 NEXT_PUBLIC_* 주입용) ---
      - name: Create .env file from secret
        shell: bash
        run: echo "${{ secrets.ENV }}" > .env

      # --- Docker 빌드 & 푸시 ---
      - name: Build and push Docker container
        shell: bash
        run: |
          set -euo pipefail

          DOCKER_TAG="${GAR_LOCATION}-docker.pkg.dev/${GOOGLE_PROJECT_ID}/${REPOSITORY}/${IMAGE}:${GITHUB_SHA}"

          docker build \
            --tag "${DOCKER_TAG}" \
            --build-arg GITHUB_SHA="${GITHUB_SHA}" \
            --build-arg GITHUB_REF="${GITHUB_REF}" \
            .

          docker push "${DOCKER_TAG}"

          echo "DOCKER_TAG=${DOCKER_TAG}" >> "$GITHUB_ENV"

      # --- Kubernetes Secret 으로 .env 등록 ---
      - name: Create or update Kubernetes secret from .env
        shell: bash
        run: |
          set -euo pipefail

          kubectl -n "${NAMESPACE}" create secret generic randomchat-app-env \
            --from-env-file=.env \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Render manifest
        shell: bash
        run: |
          set -euo pipefail
          sed "s|IMAGE_PLACEHOLDER|${DOCKER_TAG}|g" k8s/deployment.yaml > /tmp/deployment.rendered.yaml
          cat /tmp/deployment.rendered.yaml

      - name: Deploy to GKE
        shell: bash
        run: |
          set -euo pipefail

          kubectl apply -f /tmp/deployment.rendered.yaml
          kubectl -n "${NAMESPACE}" rollout status deployment "${DEPLOYMENT_NAME}" --timeout=180s
          kubectl -n "${NAMESPACE}" get deployment "${DEPLOYMENT_NAME}" -o wide
          kubectl -n "${NAMESPACE}" get pods -o wide
          kubectl -n "${NAMESPACE}" get svc
