apiVersion: apps/v1
kind: Deployment
metadata:
  name: randomchat-app-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: randomchat-app
  template:
    metadata:
      labels:
        app: randomchat-app
    spec:
      containers:
        - name: randomchat-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: randomchat-app-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: randomchat-app-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: randomchat-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
