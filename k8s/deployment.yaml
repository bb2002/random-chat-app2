apiVersion: apps/v1
kind: Deployment
metadata:
  name: randomchat-app-deployment
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: randomchat-app
  template:
    metadata:
      labels:
        app: randomchat-app
    spec:
      containers:
        - name: randomchat-app
          image: IMAGE_PLACEHOLDER
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: randomchat-app-env
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: randomchat-app-service
  namespace: default
spec:
  type: LoadBalancer
  selector:
    app: randomchat-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  loadBalancerSourceRanges:
    - 173.245.48.0/20
    - 103.21.244.0/22
    - 103.22.200.0/22
    - 103.31.4.0/22
    - 141.101.64.0/18
    - 108.162.192.0/18
    - 190.93.240.0/20
    - 188.114.96.0/20
    - 197.234.240.0/22
    - 198.41.128.0/17
    - 162.158.0.0/15
    - 104.16.0.0/13
    - 104.24.0.0/14
    - 172.64.0.0/13
    - 131.0.72.0/22
    - 2400:cb00::/32
    - 2606:4700::/32
    - 2803:f800::/32
    - 2405:b500::/32
    - 2405:8100::/32
    - 2a06:98c0::/29
    - 2c0f:f248::/32
